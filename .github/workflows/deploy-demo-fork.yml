name: deploy-demo-fork

on:
    workflow_run:
        workflows: [main]
        types: completed

jobs:
    check:
        if: ${{ github.event.workflow_run.event.pull_request.head.repo.full_name != github.repository }}
        runs-on: ubuntu-latest
        steps:
            - id: check
              run: |
                  echo '${{ github.event.workflow_run.event.pull_request.head.repo.full_name }}'
                  echo '${{ secrets.GITHUB_TOKEN }}'
