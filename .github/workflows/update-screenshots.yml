name: update screenshots

on: workflow_dispatch

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    run_id:
        runs-on: ubuntu-latest
        if: ${{ github.repository == 'hextion/core-components' }}
        outputs:
            run_id: ${{ steps.run_id.outputs.result }}
        steps:
            - id: run_id
              uses: actions/github-script@v7
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  result-encoding: string
                  script: |
                      const getRunId = async (page = 1) => {
                          const { owner, repo } = context.repo;
                          const per_page = 30;

                          const { data } = await github.rest.actions.listArtifactsForRepo({
                              owner,
                              repo,
                              page,
                              per_page,
                              name: 'build',
                          });

                          const run_id = data.artifacts
                              .filter((artifact) => !artifact.expired)
                              .map((artifact) => artifact.workflow_run.head_sha)
                              .find((head_sha) => head_sha === context.sha);

                          if (run_id) {
                              return run_id;
                          }

                          if (page * per_page < data.total_count) {
                              return getRunId(page + 1);
                          }

                          return '';
                      };

                      return await getRunId();

    update:
        name: update screenshots
        runs-on: ubuntu-latest
        needs: run_id
        if: ${{ github.repository == 'hextion/core-components' }}
        steps:
            - uses: actions/checkout@v4
              with:
                  # used GH_TOKEN to trigger github actions on branch update
                  # GITHUB_TOKEN doesn't trigger any action
                  # https://github.com/orgs/community/discussions/55906
                  token: ${{ secrets.GH_TOKEN }}
                  lfs: true

            - uses: ./.github/actions/ci-setup

            - name: download build
              if: ${{ needs.run_id.outputs.run_id != '' }}
              uses: actions/download-artifact@v4
              with:
                  name: build
                  path: build
                  run-id: ${{ needs.run_id.outputs.run_id }}
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  repository: ${{ github.repository }}

            - name: update screenshots
              shell: bash
              run: |
                  yarn test:screenshots -u

            - name: check git status
              id: git-status
              uses: actions/github-script@v7
              with:
                  script: |
                      const { stdout } = await exec.getExecOutput('git', ['status', '--porcelain']);

                      return stdout.split('\n').some(line => /^\s+M\s+.*\.png$/.test(line));

            - name: update branch
              if: ${{ steps.git-status.outputs.result == 'true' }}
              uses: ./.github/actions/commit-and-push
              with:
                  message: 'test: updated screenshots'
